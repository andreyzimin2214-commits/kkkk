<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Побег из больницы</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-container { max-width: 600px; padding: 20px; background: #2a2a2a; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; }
        .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 5px; background: #444; color: white; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #666; }
    </style>
</head>
<body>
    <div class="game-container">
        <p>{{ scene.text }}</p>
        <form action="/action" method="post" class="choices">
            {% for choice in scene.choices %}
                <button type="submit" name="next_scene" value="{{ choice.next }}">
                    {{ choice.text }}
                </button>
            {% endfor %}
        </form>
    </div>
</body>
</html>
